<html>

    <head>
    	<title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    	<meta charset="utf-8" />
    	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    	<!--[if lte IE 8]><script src="{{ "assets/js/ie/html5shiv.js" | relative_url }}"></script><![endif]-->
    	<link rel="stylesheet" href="{{ "assets/css/main.css" | relative_url }}" />
    	<!--[if lte IE 9]><link rel="stylesheet" href="{{ "assets/css/ie9.css" | relative_url }}" /><![endif]-->
    	<!--[if lte IE 8]><link rel="stylesheet" href="{{ "assets/css/ie8.css" | relative_url }}" /><![endif]-->
    	{% if page.hide_chrome %}
    	<style>
    		#banner { display: none !important; }
    		#contact { display: none !important; }
    		footer { display: none !important; }

    		#play-frame {
    			position: fixed;
    			top: 0;
    			left: 0;
    			width: 100%;
    			height: 100vh;
    			border: none;
    			display: block;
    			z-index: 999;
    		}
    	</style>
    	{% endif %}
    </head>

    <body>

        {% include header.html %}

        <section id="banner"{% if page.banner-style %} class="{{ page.banner-style }}"{% endif %}>
            <div class="inner">
                <span class="image">
                    <img src="{{ site.baseurl }}/{{ page.image }}" alt="">
                </span>
                <header class="major">
                    <h1>{{ page.title }}</h1>
                </header>
                <div class="content" id="banner-description">
                    {{ page.description }}
                </div>
            </div>
        </section>

    {{ content }}

    {% include footer.html %}

    {% if page.live-stats %}
    <script>
    (function () {
      var STATUS_URL = "https://integritystatus.blob.core.windows.net/public/status.json";

      fetch(STATUS_URL, { cache: "no-cache" })
        .then(function (r) {
          if (!r.ok) throw new Error("HTTP " + r.status);
          return r.json();
        })
        .then(function (data) {
          var el = document.getElementById("banner-description");
          if (el && data.data_points && data.relationships) {
            el.innerHTML = data.data_points + " in " + data.relationships +
              "&hellip;<br /><br />updated when you ask, because it is your data.";
          }
        })
        .catch(function (err) {
          console.warn("Integrity status fetch failed:", err);
        });
    })();
    </script>
    {% endif %}

</body>

</html>
